<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thread - GameVerse</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Glass Navigation (Matches index.html) -->
    <nav class="glass-nav">
        <a href="index.html" class="logo" style="text-decoration: none;">GAME<span style="color: #fff">VERSE</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Store</a></li>
            <li><a href="community.html">Community</a></li>
            <li><a href="guide.html" class="active">Guide</a></li>
        </ul>
        <button id="nav-login-btn" class="btn-primary glow">Login</button>
    </nav>

    <!-- Thread Header -->
    <header class="guide-hero" style="padding-top: 100px; padding-bottom: 20px;">
        <div class="hero-gradient-overlay" style="background: linear-gradient(to bottom, transparent 0%, var(--bg-dark) 100%);"></div>
        <div class="container guide-hero-content" style="text-align: left; max-width: 1000px;">
            <div class="breadcrumb" id="thread-breadcrumb" style="font-family: 'Chakra Petch', sans-serif; font-size: 1.1em; margin-bottom: 10px; color: var(--text-muted);">
                <a href="guide.html" style="color: var(--text-muted); text-decoration: none;">Guides</a> > <span>Loading...</span>
            </div>
            <h1 class="guide-title text-glow" id="thread-title" style="font-size: 2.5rem; margin-bottom: 0;">Loading Thread...</h1>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="container thread-container" id="thread-container" style="max-width: 1000px; padding-top: 20px;">
        <!-- JS will inject .post-block here -->
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="auth-modal hidden">
        <div class="auth-content glass-panel">
            <span class="close-modal" id="close-modal">&times;</span>
            <div class="auth-tabs">
                <button class="auth-tab active" data-target="login">Login</button>
                <button class="auth-tab" data-target="register">Register</button>
            </div>
            
            <form id="form-login" class="auth-form active">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn-primary glow-neon w-100">Login</button>
            </form>
            
            <form id="form-register" class="auth-form hidden">
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="text" id="reg-username" placeholder="Username" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <button type="submit" class="btn-primary glow-neon w-100">Register</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/thread-loader.js"></script>
</body>
</html>
